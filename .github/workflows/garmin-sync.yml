name: Garmin sync

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install garminconnect
        run: pip install garminconnect --quiet

      - name: Restore Garmin tokens
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
        run: |
          mkdir -p ~/.garminconnect
          python3 -c "import base64,os; open(os.path.expanduser('~/.garminconnect/garmin_tokens.json'),'wb').write(base64.b64decode(os.environ['GARMIN_TOKENS']))"

      - name: Fetch from Garmin
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python sync/sync.py

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python3 -c "
          import json, urllib.request, os
          content = open('garmin-data.json').read()
          payload = json.dumps({'files': {'garmin-data.json': {'content': content}}}).encode()
          req = urllib.request.Request(
              'https://api.github.com/gists/5508c95d96946a81166c369ccfcc3cd1',
              data=payload, method='PATCH',
              headers={
                  'Authorization': 'token ' + os.environ['GIST_TOKEN'],
                  'Accept': 'application/vnd.github+json',
                  'User-Agent': 'roc-sync'
              }
          )
          urllib.request.urlopen(req)
          print('Gist updated')
          "
