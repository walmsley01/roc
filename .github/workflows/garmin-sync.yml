name: Garmin sync

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install garminconnect
        run: pip install garminconnect --quiet

      - name: Fetch from Garmin
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python sync/sync.py

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python sync/deploy.py --sync
