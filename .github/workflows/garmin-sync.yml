name: Garmin sync

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install garminconnect
        run: pip install garminconnect --quiet

      - name: Restore Garmin tokens
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
        run: |
          mkdir -p ~/.garminconnect
          echo "$GARMIN_TOKENS" | base64 -d > ~/.garminconnect/garmin_tokens.json

      - name: Debug token
        run: |
          echo "garminconnect version:"
          pip show garminconnect | grep Version
          echo "Token file:"
          ls -la ~/.garminconnect/
          echo "Token keys:"
          python3 -c "import json; d=json.load(open('/root/.garminconnect/garmin_tokens.json')); print(list(d.keys()))"

      - name: Fetch from Garmin
        run: python sync/sync.py

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python sync/deploy.py --sync
